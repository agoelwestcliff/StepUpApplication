<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StepUp Employee Network</title>
    <link rel="stylesheet" href="src/styles.css" />
  </head>
  <body>
    <main class="page" id="auth-page">
      <section class="auth-box" id="auth-panel" aria-labelledby="stepup-title">
        <div class="logo" aria-label="StepUp">
          <span>S</span>
          <h1 id="stepup-title">StepUp</h1>
        </div>

        <p id="form-description">Create an employee account with your email.</p>

        <form id="auth-form" novalidate>
          <div class="signup-field">
            <label for="firstName">First Name</label>
            <input id="firstName" name="firstName" type="text" placeholder="Enter your first name" />
          </div>

          <div class="signup-field">
            <label for="lastName">Last Name</label>
            <input id="lastName" name="lastName" type="text" placeholder="Enter your last name" />
          </div>

          <label for="email">Email</label>
          <input id="email" name="email" type="email" placeholder="Enter your email" />

          <label for="password">Password</label>
          <div class="password-field">
            <input id="password" name="password" type="password" placeholder="Create a password" />
            <button type="button" class="toggle-password" data-target="password" aria-label="Show password" aria-pressed="false"></button>
          </div>

          <p class="message" id="message" role="status" aria-live="polite"></p>

          <button type="submit" id="submit-button">Sign Up</button>
        </form>

        <button class="link-button" type="button" id="switch-mode">
          Already have an account? Login
        </button>
      </section>
    </main>

    <div class="app hidden" id="dashboard" aria-labelledby="profile-title">
      <header class="app-header">
        <div class="logo" aria-label="StepUp">
          <span>S</span>
          <h1>StepUp</h1>
        </div>
        <button class="link-button header-action" type="button" id="logout-button">Logout</button>
      </header>

      <main class="app-main" id="profile-view">
        <h2 id="profile-title">Your Profile</h2>

        <section class="card profile-card">
          <div class="avatar" id="profile-avatar" aria-hidden="true"></div>
          <div class="profile-identity">
            <p class="profile-name" id="profile-name"></p>
            <p class="profile-email" id="profile-email"></p>
            <button type="button" class="link-button profile-action" id="show-password-page">
              Update Password
            </button>
          </div>
        </section>
      </main>

      <main class="app-main hidden" id="password-view">
        <button type="button" class="back-link" id="back-to-profile" aria-label="Back to profile">
          &larr; Back to profile
        </button>

        <h2>Update Password</h2>

        <section class="card">
          <form id="password-form" class="card-form" novalidate>
            <div class="form-row">
              <label for="currentPassword">Current Password</label>
              <div class="password-field">
                <input id="currentPassword" name="currentPassword" type="password" placeholder="Enter your current password" />
                <button type="button" class="toggle-password" data-target="currentPassword" aria-label="Show current password" aria-pressed="false"></button>
              </div>
            </div>

            <div class="form-row">
              <label for="newPassword">New Password</label>
              <div class="password-field">
                <input id="newPassword" name="newPassword" type="password" placeholder="Enter a new password" />
                <button type="button" class="toggle-password" data-target="newPassword" aria-label="Show new password" aria-pressed="false"></button>
              </div>
            </div>

            <div class="form-row">
              <label for="confirmPassword">Confirm New Password</label>
              <div class="password-field">
                <input id="confirmPassword" name="confirmPassword" type="password" placeholder="Re-enter the new password" />
                <button type="button" class="toggle-password" data-target="confirmPassword" aria-label="Show confirmation password" aria-pressed="false"></button>
              </div>
            </div>

            <p class="message" id="password-message" role="status" aria-live="polite"></p>

            <button type="submit" id="update-password-button">Update Password</button>
          </form>
        </section>
      </main>
    </div>

    <script src="src/app.js" defer></script>
  </body>
</html>
