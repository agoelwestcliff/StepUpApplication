<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StepUp Employee Network</title>
    <link rel="stylesheet" href="src/styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="auth-box" id="auth-panel" aria-labelledby="stepup-title">
        <div class="logo" aria-label="StepUp">
          <span>S</span>
          <h1 id="stepup-title">StepUp</h1>
        </div>

        <p id="form-description">Create an employee account with your email.</p>

        <form id="auth-form" novalidate>
          <div class="signup-field">
            <label for="firstName">First Name</label>
            <input id="firstName" name="firstName" type="text" placeholder="Enter your first name" />
          </div>

          <div class="signup-field">
            <label for="lastName">Last Name</label>
            <input id="lastName" name="lastName" type="text" placeholder="Enter your last name" />
          </div>

          <label for="email">Email</label>
          <input id="email" name="email" type="email" placeholder="Enter your email" />

          <label for="password">Password</label>
          <input id="password" name="password" type="password" placeholder="Create a password" />

          <p class="message" id="message" role="status" aria-live="polite"></p>

          <button type="submit" id="submit-button">Sign Up</button>
        </form>

        <button class="link-button" type="button" id="switch-mode">
          Already have an account? Login
        </button>
      </section>

      <section class="auth-box hidden" id="dashboard" aria-labelledby="profile-title">
        <div class="logo" aria-label="StepUp">
          <span>S</span>
          <h1>StepUp</h1>
        </div>

        <h2 id="profile-title">Your Profile</h2>

        <dl class="profile-details">
          <dt>Name</dt>
          <dd id="profile-name"></dd>
          <dt>Email</dt>
          <dd id="profile-email"></dd>
        </dl>

        <h3 class="profile-subtitle">Update Password</h3>

        <form id="password-form" novalidate>
          <label for="currentPassword">Current Password</label>
          <input id="currentPassword" name="currentPassword" type="password" placeholder="Enter your current password" />

          <label for="newPassword">New Password</label>
          <input id="newPassword" name="newPassword" type="password" placeholder="Enter a new password" />

          <label for="confirmPassword">Confirm New Password</label>
          <input id="confirmPassword" name="confirmPassword" type="password" placeholder="Re-enter the new password" />

          <p class="message" id="password-message" role="status" aria-live="polite"></p>

          <button type="submit" id="update-password-button">Update Password</button>
        </form>

        <button class="link-button" type="button" id="logout-button">Logout</button>
      </section>
    </main>

    <script src="src/app.js" defer></script>
  </body>
</html>
